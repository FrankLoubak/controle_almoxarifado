# docker-compose.yml — ambiente de desenvolvimento
# Sobe o PostgreSQL local para o backend (Drizzle). Em produção (Sprint 11) o compose
# será estendido com backend + frontend.
services:
  postgres:
    image: postgres:16-alpine
    container_name: almox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: almox
      POSTGRES_PASSWORD: almox_dev
      POSTGRES_DB: almoxarifado
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - almox_pgdata:/var/lib/postgresql/data

volumes:
  almox_pgdata:
